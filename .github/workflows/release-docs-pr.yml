name: Gerar Docs de Release (PR)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao alvo sem prefixo v (ex: 0.4.3)'
        required: true
      base_tag:
        description: 'Tag base para comparar commits (ex: v0.4.2). Vazio usa a ultima tag.'
        required: false
      head_ref:
        description: 'Referencia final de comparacao (branch, tag ou commit)'
        required: false
        default: HEAD

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-docs-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gerar rascunho de CHANGELOG e RELEASE NOTES
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          BASE_ARG=""
          HEAD_ARG=""

          if [ -n "${{ inputs.base_tag }}" ]; then
            BASE_ARG="--base ${{ inputs.base_tag }}"
          fi

          if [ -n "${{ inputs.head_ref }}" ]; then
            HEAD_ARG="--head ${{ inputs.head_ref }}"
          fi

          npm run release:docs -- --version "${{ inputs.version }}" $BASE_ARG $HEAD_ARG

      - name: Criar PR com rascunho
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_DOCS_GH_TOKEN || github.token }}
          commit-message: 'docs(release): rascunho changelog/release notes v${{ inputs.version }}'
          branch: 'chore/release-docs-v${{ inputs.version }}'
          title: 'docs(release): preparar notas para v${{ inputs.version }}'
          body: |
            PR automática para revisão das notas de release.

            Escopo:
            - Atualiza seção [Não Lançado] do CHANGELOG.md a partir dos commits no intervalo.
            - Adiciona rascunho da versão em RELEASE_NOTES.md.

            Checklist:
            - [ ] Revisar categorias e linguagem para público final.
            - [ ] Confirmar escopo técnico com os commits do período.
            - [ ] Se houver feature importante, atualizar `tests/casos_de_teste.md` e revisar a seção de teste manual em `RELEASE_NOTES.md`.
            - [ ] Ajustar o que for necessário antes do merge.
          labels: |
            release
            documentation
