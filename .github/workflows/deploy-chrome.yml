name: Deploy na Chrome Web Store

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch: # Permite rodar manualmente na aba Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Chrome Web Store
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Dependências e Buildar
        run: |
          npm ci || echo "Node modules não necessários ou cache"
          npm run build

      - name: Upload pra Loja da Google
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          file-path: 'pestto-latest.zip'
