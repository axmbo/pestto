name: Deploy na Chrome Web Store

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Digite SIM_DEPLOY_LOJA para confirmar deploy na Chrome Web Store'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Chrome Web Store
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Confirmacao explicita obrigatoria
        shell: bash
        run: |
          set -euo pipefail
          CONFIRM="${{ github.event.inputs.confirm_deploy }}"

          if [[ "$CONFIRM" != "SIM_DEPLOY_LOJA" ]]; then
            echo "::error::Deploy cancelado: confirmacao invalida. Para prosseguir, execute novamente e informe exatamente SIM_DEPLOY_LOJA."
            {
              echo "## Deploy cancelado"
              echo "- Motivo: confirmacao explicita nao fornecida"
              echo "- Valor informado: $CONFIRM"
              echo "- Valor esperado: SIM_DEPLOY_LOJA"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Bloquear deploy de pre-release (RC/Beta)
        shell: bash
        run: |
          set -euo pipefail

          fail_blocked() {
            local reason="$1"
            echo "::error::Deploy bloqueado na Chrome Web Store. Motivo: $reason"
            echo "::error::Como proceder: publique RC/Beta apenas como GitHub Pre-release e distribua o ZIP para homologacao tecnica."
            echo "::error::Consulte o guia em release.md para o fluxo correto."
            {
              echo "## Deploy bloqueado"
              echo "- Motivo: $reason"
              echo "- Acao esperada: usar RC/Beta somente via ZIP no GitHub Release"
              echo "- Guia: release.md"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          VERSION="$(node -p "require('./package.json').version")"

          if [[ "$VERSION" =~ -(rc|beta)(\.|$) ]]; then
            fail_blocked "versao do package.json e pre-release ($VERSION)"
          fi

      - name: Instalar Dependências e Buildar
        run: |
          npm ci || echo "Node modules não necessários ou cache"
          npm run build

      - name: Upload pra Loja da Google
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          file-path: 'pestto-latest.zip'
