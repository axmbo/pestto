name: Publicar Release Oficial

env:
  ZIP_NAME: pestto-latest.zip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags:
      - 'v*' # Roda apenas quando enviarmos uma tag (ex: v0.2.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gerar version.js
        run: ./generate-version.sh "${{ github.run_number }}" "${GITHUB_SHA::7}"

      - name: Construir extensão
        run: npm run build

      # Renomeia o arquivo para ficar com o nome da versão bonitinho
      - name: Renomear arquivo para a versão
        run: mv ${{ env.ZIP_NAME }} pestto-${{ github.ref_name }}.zip

      - name: Publicar na aba Releases
        uses: softprops/action-gh-release@v2
        with:
          files: pestto-${{ github.ref_name }}.zip
          generate_release_notes: true
