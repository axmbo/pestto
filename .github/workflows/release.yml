name: Publicar Release Oficial

env:
  ZIP_NAME: pestto-latest.zip

on:
  push:
    tags:
      - 'v*' # Roda apenas quando enviarmos uma tag (ex: v0.2.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gerar version.js
        run: ./scripts/generate-version.sh "${{ github.run_number }}" "${GITHUB_SHA::7}"

      - name: Construir extensão
        run: npm run build

      # Renomeia o arquivo para ficar com o nome da versão bonitinho
      - name: Renomear arquivo para a versão
        run: mv ${{ env.ZIP_NAME }} pestto-${{ github.ref_name }}.zip

      - name: Publicar na aba Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} pestto-${{ github.ref_name }}.zip --generate-notes
