name: Publicar Release Oficial

env:
  ZIP_NAME: pestto-latest.zip

on:
  push:
    tags:
      - 'v*' # Roda apenas quando enviarmos uma tag (ex: v0.2.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gerar version.js
        run: ./scripts/generate-version.sh "${{ github.run_number }}" "${GITHUB_SHA::7}"

      - name: Construir extensão
        run: npm run build

      # Renomeia o arquivo para ficar com o nome da versão bonitinho
      - name: Renomear arquivo para a versão
        run: mv ${{ env.ZIP_NAME }} pestto-${{ github.ref_name }}.zip

      - name: Montar notas da release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md << 'EOF'
          ## Instalacao

          1. Baixe o arquivo `pestto-${{ github.ref_name }}.zip` desta release.
          2. Abra `chrome://extensions/` no Chrome, Edge ou Brave.
          3. Ative o modo desenvolvedor.
          4. Arraste o ZIP para a pagina de extensoes para instalar.

          Guia completo: https://github.com/axmbo/pestto/blob/main/docs/INSTALACAO.md
          EOF

          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} \
            --jq '.body' > generated-notes.md

          if ! grep -q "^## What's Changed" generated-notes.md; then
            {
              echo
              echo "## What's Changed"
              echo "- No pull requests were merged in this release window."
            } >> generated-notes.md
          fi

          if ! grep -q "^## New Contributors" generated-notes.md; then
            {
              echo
              echo "## New Contributors"
              echo "- No first-time contributors in this release window."
            } >> generated-notes.md
          fi

          {
            echo
            cat generated-notes.md
          } >> release-notes.md

      - name: Publicar na aba Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRE_RELEASE_FLAG=""

          case "${{ github.ref_name }}" in
            *-beta.*|*-rc.*)
              PRE_RELEASE_FLAG="--prerelease"
              ;;
          esac

          gh release create ${{ github.ref_name }} pestto-${{ github.ref_name }}.zip \
            --notes-file release-notes.md \
            ${PRE_RELEASE_FLAG}
