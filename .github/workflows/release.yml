name: Publicar Release Oficial

env:
  ZIP_NAME: pestto-latest.zip

on:
  push:
    tags:
      - 'v*' # Roda apenas quando enviarmos uma tag (ex: v0.2.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fazer checkout do código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Gerar version.js
        run: ./scripts/generate-version.sh "${{ github.run_number }}" "${GITHUB_SHA::7}"

      - name: Construir extensão
        run: npm run build

      # Renomeia o arquivo para ficar com o nome da versão bonitinho
      - name: Renomear arquivo para a versão
        run: mv ${{ env.ZIP_NAME }} pestto-${{ github.ref_name }}.zip

      - name: Montar notas da release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          fail_release_notes() {
            local cause="$1"
            local action="$2"
            local error_message="$3"

            {
              echo "### Falha na geração automática das release notes"
              echo
              echo "- Tag: ${{ github.ref_name }}"
              echo "- Causa: $cause"
              echo "- Ação: $action"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "$error_message" >&2
            exit 1
          }

          cat > release-notes.md << 'EOF'
          ## Instalacao

          1. Baixe o arquivo `pestto-${{ github.ref_name }}.zip` desta release.
          2. Abra `chrome://extensions/` no Chrome, Edge ou Brave.
          3. Ative o modo desenvolvedor.
          4. Arraste o ZIP para a pagina de extensoes para instalar.

          Guia completo: https://github.com/axmbo/pestto/blob/main/docs/INSTALACAO.md
          EOF

          if ! gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} \
            --jq '.body' > generated-notes.md; then
            fail_release_notes \
              "erro ao chamar a API de generate-notes" \
              "validar GH_TOKEN/permissoes, conectividade e tentar novamente" \
              "Falha ao chamar a API de generate-notes para ${{ github.ref_name }}."
          fi

          GENERATED_NOTES_CONTENT="$(tr -d '[:space:]' < generated-notes.md)"

          if [[ -z "$GENERATED_NOTES_CONTENT" || "$GENERATED_NOTES_CONTENT" == "null" ]]; then
            fail_release_notes \
              "retorno vazio ou nulo da API de generate-notes" \
              "validar GH_TOKEN/permissoes e tentar novamente" \
              "Falha ao gerar notas automaticas da release para ${{ github.ref_name }}."
          fi

          if ! grep -q "^## What's Changed" generated-notes.md; then
            {
              echo
              echo "## What's Changed"
              echo "- No pull requests were merged in this release window."
            } >> generated-notes.md
          fi

          if ! grep -q "^## New Contributors" generated-notes.md; then
            {
              echo
              echo "## New Contributors"
              echo "- No first-time contributors in this release window."
            } >> generated-notes.md
          fi

          {
            echo
            cat generated-notes.md
          } >> release-notes.md

      - name: Publicar na aba Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PRE_RELEASE_FLAG=""

          case "${{ github.ref_name }}" in
            *-beta.*|*-rc.*)
              PRE_RELEASE_FLAG="--prerelease"
              ;;
          esac

          gh release create ${{ github.ref_name }} pestto-${{ github.ref_name }}.zip \
            --notes-file release-notes.md \
            ${PRE_RELEASE_FLAG}
